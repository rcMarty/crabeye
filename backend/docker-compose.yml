version: '3.9'

services:
  postgres:
    image: postgres:14-alpine
    ports:
      - "5431:5432"
    volumes:
      - ~/apps/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=S3cret
      - POSTGRES_USER=ranal_user
      - POSTGRES_DB=ranal_db


volumes:
  db_data:
    driver: local
